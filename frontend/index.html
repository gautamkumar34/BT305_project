<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BioTransformer | Molecular Similarity</title>

    <!-- RDKit.js (WASM) loader (global: window.initRDKitModule / window.RDKitModule) -->
    <!-- This CDN provides the standard initRDKitModule factory used by many RDKit.js builds. -->
    <script defer src="https://unpkg.com/@rdkit/rdkit/Code/MinimalLib/dist/RDKit_minimal.js"></script>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // RDKit_minimal.js is loaded with `defer`, so it may not be available yet when
      // this inline script runs. Create a promise that patiently waits for the factory
      // function to exist, then initializes RDKit exactly once.
      if (!window.initRDKitPromise) {
        window.initRDKitPromise = new Promise((resolve) => {
          const tryInit = () => {
            if (window.RDKitModule) return resolve(window.RDKitModule);
            if (typeof window.initRDKitModule === "function") {
              window
                .initRDKitModule()
                .then((mod) => {
                  window.RDKitModule = mod;
                  resolve(mod);
                })
                .catch(() => resolve(null));
              return;
            }
            setTimeout(tryInit, 50);
          };
          tryInit();
        });
      }
    </script>
  </body>
</html>
